# M0 local stack (§12): TimescaleDB + Mosquitto + the edge and cloud services.
# `docker compose up` then `curl localhost:8080/healthz` satisfies the M0 gate.

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: mes
      POSTGRES_PASSWORD: mes
      POSTGRES_DB: mes
    ports:
      - "5432:5432"
    volumes:
      - tsdb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mes -d mes"]
      interval: 5s
      timeout: 5s
      retries: 10

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    command: ["mosquitto", "-c", "/mosquitto-no-auth.conf"]

  edge:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["mes-edge"]
    environment:
      MES_EDGE_BIND: "0.0.0.0:8080"
      DATABASE_URL: "postgres://mes:mes@timescaledb:5432/mes"
      RUST_LOG: "info,mes_edge=debug"
    ports:
      - "8080:8080"
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  cloud:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["mes-cloud"]
    environment:
      MES_CLOUD_BIND: "0.0.0.0:8090"
      DATABASE_URL: "postgres://mes:mes@timescaledb:5432/mes"
      RUST_LOG: "info,mes_cloud=debug"
    ports:
      - "8090:8090"
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8090/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  tsdb_data:
